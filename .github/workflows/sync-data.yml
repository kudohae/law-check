name: Sync public law data

on:
  workflow_dispatch:
  push:
    branches:
      - codex/since-date-no-ai-sync
    paths:
      - .github/workflows/sync-data.yml
      - scripts/sync-data.ts
      - README.md
      - .env.example
  schedule:
    # 18:00 Asia/Seoul = 09:00 UTC.
    - cron: "0 9 * * *"

permissions:
  contents: write

concurrency:
  group: sync-public-law-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync data
        run: npm run sync:data
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
          LAWMAKING_API_KEY: ${{ secrets.LAWMAKING_API_KEY }}
          LAW_CHECK_SINCE_DATE: "2025-06-01"
          ASSEMBLY_MAX_PAGES: "500"
          LAWMAKING_MAX_PAGES: "100"
          LAWMAKING_CHUNK_DAYS: "31"
          LAW_CHECK_REQUEST_DELAY_MS: "1000"
          LAW_CHECK_RETRY_COUNT: "3"
          LAW_CHECK_RETRY_DELAY_MS: "5000"

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update public law data"
          file_pattern: public/data/bills.json
