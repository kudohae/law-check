name: Sync public law data

on:
  workflow_dispatch:
  schedule:
    # 18:00 Asia/Seoul = 09:00 UTC.
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync data
        run: npm run sync:data
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
          LAWMAKING_API_KEY: ${{ secrets.LAWMAKING_API_KEY }}

      - name: Generate missing AI summaries
        run: npm run summarize:data
        env:
          SUMMARY_PROVIDER: gemini
          SUMMARY_LIMIT: "0"
          SUMMARY_FORCE: "0"
          SUMMARY_DELAY_MS: "12000"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update public law data"
          file_pattern: public/data/bills.json
